services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: parking-free-postgres
    environment:
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
      POSTGRES_DB: parking
    ports:
      - "5432:5432"
    volumes:
      - parking-free-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking -d parking"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  parking-free-pgdata:
